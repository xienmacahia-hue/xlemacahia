<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Student Outcomes - Xienna Louise E. Macahia</title>
  <link rel="stylesheet" href="stylet.css">
</head>
<body>
  <header>
    <div class="logo">E-Portfolio</div>
    <nav id="navbar">
      <button class="toggle">☰</button>
      <div class="links">
        <a href="index.html">Home</a>
        <a href="activities.html">Activities</a>
        <a href="outcomes.html">Student Outcomes</a>
        <a href="attributes.html">Graduate Attributes</a>
        <a href="contact.html">Contact</a>
      </div>
    </nav>
  </header>

  <main>
    <section>
      <h1>Student Outcomes</h1>

      <div class="outcomes-container">

        <!-- Outcome 1 -->
        <div class="collapsible-card">
          <div class="collapsible">
            <span>Outcome 1</span>
            <span class="arrow">▼</span>
          </div>
          <div class="content">
            <p></p>
          </div>
        </div>

        <!-- Outcome 2 -->
        <div class="collapsible-card">
          <div class="collapsible">
            <span>Outcome 2</span>
            <span class="arrow">▼</span>
          </div>
          <div class="content">
            <p></p>
          </div>
        </div>

        <!-- Outcome 3 (optional future) -->
        <div class="collapsible-card">
          <div class="collapsible">
            <span>Outcome 3</span>
            <span class="arrow">▼</span>
          </div>
          <div class="content">
            <p></p>
          </div>
        </div>

      </div>

    </section>
  </main>

  <footer>
    2026 E-Portfolio of Xienna Louise E. Macahia
  </footer>

  <script>
    document.querySelector(".toggle").addEventListener("click", () => {
      document.querySelector(".links").classList.toggle("show");
    });

    const collapsibles = document.querySelectorAll(".collapsible");

    collapsibles.forEach(item => {
      item.addEventListener("click", () => {
        const content = item.nextElementSibling;
        const arrow = item.querySelector(".arrow");

        if (content.style.maxHeight) {
          content.style.maxHeight = null;
          arrow.style.transform = "rotate(0deg)";
        } else {
          content.style.maxHeight = content.scrollHeight + "px";
          arrow.style.transform = "rotate(180deg)";
        }
      });
    });
  </script>
</body>
</html>
