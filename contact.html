<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact - Xienna Louise E. Macahia</title>
  <link rel="stylesheet" href="stylet.css">
</head>
<body>
  <header>
    <div class="logo">E-Portfolio</div>
    <nav id="navbar">
      <button class="toggle">☰</button>
      <div class="links">
        <a href="index.html">Home</a>
        <a href="activities.html">Activities</a>
        <a href="outcomes.html">Student Outcomes</a>
        <a href="attributes.html">Graduate Attributes</a>
        <a href="contact.html">Contact</a>
      </div>
    </nav>
  </header>

  <main>
    <section>
      <h1>Contact Me</h1>

      <div class="card">
        <h2>Email Addresses</h2>
        <p><strong>School Email:</strong> <a href="mailto:xlemacahia@mymail.mapua.edu.ph">xlemacahia@mymail.mapua.edu.ph</a></p>
        <p><strong>Personal Email:</strong> <a href="mailto:xien.macahia@gmail.com">xien.macahia@gmail.com</a></p>
      </div>

      <div class="card">
        <h2>Social Media</h2>
        <div class="social-icons">
          <a href="hhttps://www.facebook.com/xienna.macahia" target="_blank">
            <img src="images/facebook.png" alt="Facebook">
          </a>
          <a href="https://www.instagram.com/xielou.m/" target="_blank">
            <img src="images/instagram.png" alt="Instagram">
          </a>
        </div>
      </div>

      <div class="card">
        <h2>Send a Message</h2>
        <form>
          <label for="name">Name:</label>
          <input type="text" id="name" name="name" required>

          <label for="email">Your Email:</label>
          <input type="email" id="email" name="email" required>

          <label for="message">Message:</label>
          <textarea id="message" name="message" rows="5"></textarea>

          <button type="submit">Send</button>
        </form>
      </div>
    </section>
  </main>

  <footer>
    2026 E-Portfolio of Xienna Louise E. Macahia
  </footer>

  <script>
    document.querySelector(".toggle").addEventListener("click", () => {
      document.querySelector(".links").classList.toggle("show");
    });
  </script>
</body>
</html>
