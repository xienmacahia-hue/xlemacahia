<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Activities - Xienna Louise E. Macahia</title>
  <link rel="stylesheet" href="stylet.css">
</head>
<body>
  <header>
    <div class="logo">E-Portfolio</div>
    <nav id="navbar">
      <button class="toggle">☰</button>
      <div class="links">
        <a href="index.html">Home</a>
        <a href="activities.html">Activities</a>
        <a href="outcomes.html">Student Outcomes</a>
        <a href="attributes.html">Graduate Attributes</a>
        <a href="contact.html">Contact</a>
      </div>
    </nav>
  </header>

  <main>
    <!-- Hero Banner -->
    <section class="hero">
      <h1>Activities</h1>
      <p>Explore my academic and extra-curricular activities</p>
    </section>

    <!-- Activities Cards -->
    <section class="activities-grid">

      <div class="collapsible-card">
        <div class="collapsible">
          <span>Seminars & Conferences</span>
          <span class="arrow">V</span>
        </div>
        <div class="content">
          <p></p> <!-- Add details here later -->
        </div>
      </div>

      <div class="collapsible-card">
        <div class="collapsible">
          <span>Coursera Certificates</span>
          <span class="arrow">V</span>
        </div>
        <div class="content">
          <p></p>
        </div>
      </div>

      <div class="collapsible-card">
        <div class="collapsible">
          <span>Extra-Curricular</span>
          <span class="arrow">V</span>
        </div>
        <div class="content">
          <p></p>
        </div>
      </div>

    </section>
  </main>

  <footer>
    2026 E-Portfolio of Xienna Louise E. Macahia
  </footer>

  <script>
    // Navbar toggle
    document.querySelector(".toggle").addEventListener("click", () => {
      document.querySelector(".links").classList.toggle("show");
    });

    // Collapsible cards
    const collapsibles = document.querySelectorAll(".collapsible");

    collapsibles.forEach(item => {
      item.addEventListener("click", () => {
        const content = item.nextElementSibling;
        const arrow = item.querySelector(".arrow");

        if (content.style.maxHeight) {
          content.style.maxHeight = null;
          arrow.style.transform = "rotate(0deg)";
        } else {
          content.style.maxHeight = content.scrollHeight + "px";
          arrow.style.transform = "rotate(180deg)";
        }
      });
    });
  </script>
</body>
</html>
